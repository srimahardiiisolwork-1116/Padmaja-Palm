[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  # Tell Netlify to ignore the Google Maps key in secrets scanning
  SECRETS_SCAN_OMIT_KEYS = "REACT_APP_GOOGLE_MAPS_API_KEY"

# Proxy API requests to your backend
[[redirects]]
  from = "/api/*"
  to = "https://padmaja-palm-backend.onrender.com/:splat"
  status = 200
  force = true

# Handle client-side routing - return index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
